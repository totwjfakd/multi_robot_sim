bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

# =======================
# Planner / Controller / Smoother
# =======================
planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    use_sim_time: True
    odom_frame: "<NS>/odom"
    base_frame: "<NS>/base_link"
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      min_vel_x: 0.0
      max_vel_x: 0.8
      max_vel_theta: 2.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      vx_samples: 20
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      critics: ["RotateToGoal","Oscillation","BaseObstacle","GoalAlign","PathAlign","PathDist","GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 16.0
      GoalAlign.scale: 12.0
      PathDist.scale: 16.0
      GoalDist.scale: 12.0
      RotateToGoal.scale: 24.0

smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# =======================
# Behaviors / Recoveries
# =======================
behavior_server:
  ros__parameters:
    use_sim_time: True
    global_frame: "<NS>/odom"
    robot_base_frame: "<NS>/base_link"
    cycle_frequency: 10.0
    behavior_plugins: ["spin","backup","drive_on_heading","assisted_teleop","wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

# =======================
# Costmaps
# =======================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: "map"              # 공용 map
      robot_base_frame: "<NS>/base_link"
      resolution: 0.05
      track_unknown_space: True
      update_frequency: 1.0
      publish_frequency: 1.0
      plugins: ["static_layer","obstacle_layer","inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        # map_topic: "/map"            # 기본값이 /map 이므로 생략 가능

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: "scan"                # -> /<NS>/scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: "<NS>/odom"
      robot_base_frame: "<NS>/base_link"
      rolling_window: True
      width: 3.0
      height: 3.0
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      plugins: ["obstacle_layer","inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: "scan"                # -> /<NS>/scan
          data_type: "LaserScan"
          clearing: True
          marking: True
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: True

# =======================
# Velocity Smoother (선택)
# =======================
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"
    max_velocity: [0.8, 0.0, 2.0]
    min_velocity: [-0.8, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"                 # -> /<NS>/odom
    odom_duration: 0.1
    velocity_timeout: 1.0

# =======================
# Lifecycle Manager (네비게이션 계열)
# =======================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: True
    bond_timeout: 2.0
    node_names:
      - "planner_server"
      - "controller_server"
      - "smoother_server"
      - "bt_navigator"
      - "behavior_server"
      - "velocity_smoother"
      - "amcl"
